version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: movie_bot_db
    restart: always
    environment:
      POSTGRES_USER: movie_user
      POSTGRES_PASSWORD: movie_password
      POSTGRES_DB: movie_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bot:
    build: .
    container_name: movie_bot_app
    restart: always
    depends_on:
      - db
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - DATABASE_URL=postgresql://movie_user:movie_password@db:5432/movie_db
      - MOVIE_CHANNEL_ID=${MOVIE_CHANNEL_ID}
      - PORT=8080
    ports:
      - "8080:8080"

volumes:
  pgdata:
